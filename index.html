<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N4 단어장 — 해커스 JLPT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0f13;
  --surface: #16171d;
  --surface2: #1e2028;
  --surface3: #272930;
  --border: #2e3040;
  --border2: #3a3d50;
  --text: #e8eaf0;
  --text2: #9296a8;
  --text3: #5c6080;
  --accent: #6c8fff;
  --accent2: #4d6ef5;
  --green: #4ecb82;
  --red: #ff6b6b;
  --yellow: #f5c842;
  --purple: #c084fc;
  --orange: #fb923c;
  --teal: #2dd4bf;
  --pink: #f472b6;
  --s-color: #f5c842;
  --a-color: #6c8fff;
  --b-color: #4ecb82;
  --radius: 10px;
  --radius-lg: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.header-left { display: flex; align-items: center; gap: 10px; }
.logo { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: 0.05em; background: rgba(108,143,255,0.1); padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(108,143,255,0.2); }
.dday { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--yellow); background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.25); padding: 4px 10px; border-radius: 6px; white-space: nowrap; }
.progress-wrap { flex: 1; max-width: 240px; display: flex; align-items: center; gap: 8px; }
.progress-bar-bg { flex: 1; height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 99px; transition: width 0.4s ease; }
.progress-text { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); white-space: nowrap; }
.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; position: sticky; top: 53px; z-index: 99; }
.tab-btn { padding: 12px 18px; font-size: 13px; font-weight: 500; color: var(--text3); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; font-family: inherit; }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-btn:hover:not(.active) { color: var(--text2); }
.filters { padding: 14px 16px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; position: sticky; top: 101px; z-index: 98; }
.filter-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.filter-label { font-size: 10px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; width: 32px; flex-shrink: 0; }
.chip { padding: 4px 10px; font-size: 11px; font-weight: 500; border-radius: 99px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); cursor: pointer; transition: all 0.15s; font-family: inherit; white-space: nowrap; }
.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.active { background: var(--accent2); border-color: var(--accent); color: #fff; }
.chip.s.active { background: var(--s-color); border-color: var(--s-color); color: #000; }
.chip.a.active { background: var(--a-color); border-color: var(--a-color); color: #fff; }
.chip.b.active { background: var(--b-color); border-color: var(--b-color); color: #000; }
.search-input { width: 100%; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text); font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.2s; }
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text3); }
.list-content { padding: 16px; display: flex; flex-direction: column; gap: 20px; }
.group-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding: 8px 12px; background: var(--surface2); border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer; user-select: none; }
.group-kanji { font-family: 'Noto Sans JP', sans-serif; font-size: 22px; font-weight: 700; line-height: 1; }
.group-label { font-size: 12px; color: var(--text2); }
.level-badge { padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 700; font-family: 'DM Mono', monospace; letter-spacing: 0.05em; margin-left: auto; }
.level-S { background: rgba(245,200,66,0.15); color: var(--s-color); border: 1px solid rgba(245,200,66,0.3); }
.level-A { background: rgba(108,143,255,0.15); color: var(--a-color); border: 1px solid rgba(108,143,255,0.3); }
.level-B { background: rgba(78,203,130,0.15); color: var(--b-color); border: 1px solid rgba(78,203,130,0.3); }
.level-기타 { background: rgba(148,163,184,0.1); color: var(--text3); border: 1px solid var(--border); }
.level-히라 { background: rgba(244,114,182,0.1); color: var(--pink); border: 1px solid rgba(244,114,182,0.3); }
.level-부사 { background: rgba(45,212,191,0.1); color: var(--teal); border: 1px solid rgba(45,212,191,0.3); }
.level-외래 { background: rgba(251,146,60,0.1); color: var(--orange); border: 1px solid rgba(251,146,60,0.3); }
.group-count { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
.group-toggle { font-size: 12px; color: var(--text3); margin-left: 4px; transition: transform 0.2s; }
.group-toggle.open { transform: rotate(90deg); }
.words-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 8px; }
.word-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden; }
.word-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--card-color, var(--border)); }
.word-card:hover { border-color: var(--border2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
.word-card.memorized { opacity: 0.55; background: rgba(78,203,130,0.05); border-color: rgba(78,203,130,0.2); }
.word-card.memorized::before { background: var(--green); }
.word-jp { font-family: 'Noto Sans JP', sans-serif; font-size: 16px; font-weight: 500; line-height: 1.3; margin-bottom: 2px; }
.word-reading { font-family: 'Noto Sans JP', sans-serif; font-size: 10px; color: var(--text3); margin-bottom: 4px; }
.word-meaning { font-size: 12px; color: var(--text2); line-height: 1.4; }
.pos-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 9px; font-weight: 600; margin-top: 5px; }
.pos-명사 { background: rgba(108,143,255,0.15); color: var(--accent); }
.pos-동사 { background: rgba(78,203,130,0.15); color: var(--green); }
.pos-い형 { background: rgba(245,200,66,0.15); color: var(--yellow); }
.pos-な형 { background: rgba(192,132,252,0.15); color: var(--purple); }
.pos-부사 { background: rgba(45,212,191,0.15); color: var(--teal); }
.pos-외래어 { background: rgba(251,146,60,0.15); color: var(--orange); }
/* ★ DAY TAG */
.day-tag { display: inline-block; font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500; color: var(--text3); background: var(--surface3); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; margin-left: 4px; vertical-align: middle; }
.flash-day-tag { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); background: var(--surface3); border: 1px solid var(--border); border-radius: 5px; padding: 2px 8px; }
/* ★ END DAY TAG */
.check-icon { position: absolute; top: 8px; right: 8px; width: 16px; height: 16px; border-radius: 50%; background: var(--green); display: none; align-items: center; justify-content: center; font-size: 9px; color: #000; font-weight: 700; }
.word-card.memorized .check-icon { display: flex; }
.check-dots { display: flex; gap: 4px; }
.check-dots .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border2); border: 1px solid var(--border2); transition: background 0.15s, border-color 0.15s; }
.check-dots .dot.filled { background: var(--accent); border-color: var(--accent); }
.card-dots { position: absolute; top: 8px; right: 8px; }
.flash-content { padding: 16px; display: flex; flex-direction: column; gap: 14px; align-items: center; }
.flash-controls { width: 100%; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.flash-stat { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-left: auto; }
.flash-day-row { width: 100%; display: flex; gap: 5px; flex-wrap: wrap; padding: 10px 16px 4px; border-top: 1px solid var(--border); }
.day-chip { padding: 3px 8px; font-size: 10px; font-weight: 600; font-family: 'DM Mono', monospace; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text3); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.day-chip:hover { border-color: var(--accent); color: var(--accent); }
.day-chip.active { background: rgba(108,143,255,0.2); border-color: var(--accent); color: var(--accent); }
.flash-card-wrap { width: 100%; max-width: 480px; perspective: 1000px; }
.flash-card { width: 100%; min-height: 260px; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
.flash-card.flipped { transform: rotateY(180deg); }
.flash-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: var(--radius-lg); border: 1px solid var(--border2); padding: 28px 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
.flash-front { background: var(--surface2); }
.flash-back { background: var(--surface3); transform: rotateY(180deg); }
.flash-word { font-family: 'Noto Sans JP', sans-serif; font-size: 44px; font-weight: 700; line-height: 1.2; text-align: center; }
.flash-word ruby { ruby-position: over; }
.flash-word rt { font-size: 16px; font-weight: 500; color: var(--text3); font-family: 'Noto Sans JP', sans-serif; }
.flash-pos { font-size: 12px; }
.flash-group-tag { font-size: 11px; color: var(--text3); background: var(--surface3); padding: 3px 10px; border-radius: 99px; border: 1px solid var(--border); font-family: 'Noto Sans JP', sans-serif; }
.flash-hint { font-size: 11px; color: var(--text3); margin-top: 8px; }
.flash-reading { font-family: 'Noto Sans JP', sans-serif; font-size: 20px; color: var(--accent); font-weight: 500; }
.flash-meaning { font-size: 22px; font-weight: 600; text-align: center; }
.flash-related { font-size: 11px; color: var(--text3); text-align: center; line-height: 1.6; font-family: 'Noto Sans JP', sans-serif; }
.flash-nav { display: flex; gap: 10px; align-items: center; width: 100%; max-width: 480px; }
.nav-btn { flex: 1; padding: 10px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.nav-btn:hover { background: var(--surface3); color: var(--text); }
.nav-btn.memorize-btn { background: rgba(78,203,130,0.15); border-color: rgba(78,203,130,0.35); color: var(--green); }
.nav-btn.memorize-btn.undone { background: rgba(255,107,107,0.1); border-color: rgba(255,107,107,0.3); color: var(--red); }
.flash-counter { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); text-align: center; padding: 4px 12px; background: var(--surface2); border-radius: 99px; border: 1px solid var(--border); }
button { border: none; outline: none; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo">JLPT N4</div>
    <div class="dday" id="dday-counter">계산중...</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-text" id="progress-text">0 / 0</div>
  </div>
</div>
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('list')">📋 목록</button>
  <button class="tab-btn" onclick="switchTab('flash')">🃏 플래시카드</button>
</div>
<div id="tab-list" class="tab-panel active">
  <div class="filters">
    <input class="search-input" type="text" placeholder="단어 검색..." id="search-input" oninput="applyFilters()">
    <div class="filter-row">
      <span class="filter-label">등급</span>
      <button class="chip s active" data-filter-group="level" data-value="S" onclick="toggleFilter(this)">S급</button>
      <button class="chip a active" data-filter-group="level" data-value="A" onclick="toggleFilter(this)">A급</button>
      <button class="chip b active" data-filter-group="level" data-value="B" onclick="toggleFilter(this)">B급</button>
      <button class="chip active" data-filter-group="level" data-value="기타한자" onclick="toggleFilter(this)">기타한자</button>
      <button class="chip active" data-filter-group="level" data-value="히라가나" onclick="toggleFilter(this)">히라가나</button>
      <button class="chip active" data-filter-group="level" data-value="부사" onclick="toggleFilter(this)">부사</button>
      <button class="chip active" data-filter-group="level" data-value="외래어" onclick="toggleFilter(this)">외래어</button>
    </div>
    <div class="filter-row">
      <span class="filter-label">품사</span>
      <button class="chip active" data-filter-group="pos" data-value="명사" onclick="toggleFilter(this)">명사</button>
      <button class="chip active" data-filter-group="pos" data-value="동사" onclick="toggleFilter(this)">동사</button>
      <button class="chip active" data-filter-group="pos" data-value="い형" onclick="toggleFilter(this)">い형</button>
      <button class="chip active" data-filter-group="pos" data-value="な형" onclick="toggleFilter(this)">な형</button>
      <button class="chip active" data-filter-group="pos" data-value="부사" onclick="toggleFilter(this)">부사</button>
      <button class="chip active" data-filter-group="pos" data-value="외래어" onclick="toggleFilter(this)">외래어</button>
    </div>
  </div>
  <div class="list-content" id="list-content"></div>
</div>
<div id="tab-flash" class="tab-panel">
  <div class="flash-content">
    <div class="flash-controls">
      <button class="chip active" data-flash-filter="all" onclick="setFlashFilter('all',this)">전체</button>
      <button class="chip" data-flash-filter="unmemorized" onclick="setFlashFilter('unmemorized',this)">미암기</button>
      <button class="chip" data-flash-filter="memorized" onclick="setFlashFilter('memorized',this)">암기완료</button>
      <button class="chip" onclick="shuffleFlash()">🔀 셔플</button>
      <button class="chip" id="furigana-toggle" onclick="toggleFurigana()">🈶 후리가나</button>
      <span class="flash-stat" id="flash-stat">0 / 0</span>
    </div>
    <div class="filters" style="position:static;">
      <div class="filter-row">
        <span class="filter-label">등급</span>
        <button class="chip s active" data-filter-group="level" data-value="S" onclick="toggleFilter(this)">S급</button>
        <button class="chip a active" data-filter-group="level" data-value="A" onclick="toggleFilter(this)">A급</button>
        <button class="chip b active" data-filter-group="level" data-value="B" onclick="toggleFilter(this)">B급</button>
        <button class="chip active" data-filter-group="level" data-value="기타한자" onclick="toggleFilter(this)">기타한자</button>
        <button class="chip active" data-filter-group="level" data-value="히라가나" onclick="toggleFilter(this)">히라가나</button>
        <button class="chip active" data-filter-group="level" data-value="부사" onclick="toggleFilter(this)">부사</button>
        <button class="chip active" data-filter-group="level" data-value="외래어" onclick="toggleFilter(this)">외래어</button>
      </div>
      <div class="filter-row">
        <span class="filter-label">품사</span>
        <button class="chip active" data-filter-group="pos" data-value="명사" onclick="toggleFilter(this)">명사</button>
        <button class="chip active" data-filter-group="pos" data-value="동사" onclick="toggleFilter(this)">동사</button>
        <button class="chip active" data-filter-group="pos" data-value="い형" onclick="toggleFilter(this)">い형</button>
        <button class="chip active" data-filter-group="pos" data-value="な형" onclick="toggleFilter(this)">な형</button>
        <button class="chip active" data-filter-group="pos" data-value="부사" onclick="toggleFilter(this)">부사</button>
        <button class="chip active" data-filter-group="pos" data-value="외래어" onclick="toggleFilter(this)">외래어</button>
      </div>
    </div>
    <div class="flash-day-row" id="flash-day-row"></div>
    <div class="flash-card-wrap">
      <div class="flash-card" id="flash-card" onclick="flipCard()">
        <div class="flash-face flash-front">
          <div class="flash-group-tag" id="f-group">—</div>
          <div class="flash-word" id="f-word">—</div>
          <div class="flash-pos" id="f-pos-front"></div>
          <div class="check-dots" id="f-mem-dots"></div>
          <div class="flash-day-tag" id="f-day-tag" style="display:none"></div>
          <div class="flash-hint">탭하여 뒤집기 👆</div>
        </div>
        <div class="flash-face flash-back">
          <div class="flash-reading" id="f-reading">—</div>
          <div class="flash-meaning" id="f-meaning">—</div>
          <div class="flash-related" id="f-related"></div>
        </div>
      </div>
    </div>
    <div class="flash-counter" id="flash-counter">1 / 1</div>
    <div class="flash-nav">
      <button class="nav-btn" onclick="prevCard()">← 이전</button>
      <button class="nav-btn memorize-btn" id="memorize-btn" onclick="toggleMemorize()">✓ 외웠어요</button>
      <button class="nav-btn" onclick="nextCard()">다음 →</button>
    </div>
    <div style="height:20px"></div>
  </div>
</div>
<script>
// ★ DAY MAP (PDF 일차 기반)
const DAY_MAP = {

const GROUPS=[...KANJI_GROUPS.map(g=>({...g,level:calcLevel(g.words.length)})),...SPECIAL_GROUPS];
GROUPS.forEach(g=>g.words.forEach(w=>{const d=DAY_MAP[w.w];if(d!==undefined)w.day=d;}));

let memorized={},flashQueue=[],flashIndex=0,flashFilter='all',flashDayFilter=0,isFlipped=false,furiganaOn=false;
const activeFilters={level:new Set(['S','A','B','기타한자','히라가나','부사','외래어']),pos:new Set(['명사','동사','い형','な형','부사','외래어'])};

function loadMemorized(){try{const s=localStorage.getItem('n4_memorized');if(s)memorized=JSON.parse(s);}catch(e){}}
function saveMemorized(){try{localStorage.setItem('n4_memorized',JSON.stringify(memorized));}catch(e){}}
function getWordId(w){return w.w+'|'+w.r;}
function getMemLevel(wid){return memorized[wid]||0;}
function cycleMemLevel(wid){
  const next=((memorized[wid]||0)+1)%4;
  if(next===0)delete memorized[wid];else memorized[wid]=next;
  saveMemorized();
  return next;
}
function dotsSpans(lvl){
  let h='';
  for(let i=0;i<3;i++)h+=`<span class="dot${i<lvl?' filled':''}"></span>`;
  return h;
}

function updateDday(){
  const t=new Date();t.setHours(0,0,0,0);
  const d=Math.ceil((new Date('2026-07-05')-t)/(864e5));
  const el=document.getElementById('dday-counter');
  el.textContent=d>0?`D-${d} | 7/5 JLPT`:d===0?'🎌 오늘이 시험일!':`D+${Math.abs(d)} | 시험 후`;
}

function updateProgress(){
  let total=0,done=0;
  GROUPS.forEach(g=>g.words.forEach(w=>{total++;if(getMemLevel(getWordId(w))===3)done++;}));
  const pct=total?(done/total*100).toFixed(1):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-text').textContent=`${done} / ${total}`;
}

function toggleFilter(btn){
  const g=btn.dataset.filterGroup,v=btn.dataset.value;
  const on=!activeFilters[g].has(v);
  if(on)activeFilters[g].add(v);else activeFilters[g].delete(v);
  document.querySelectorAll(`[data-filter-group="${g}"][data-value="${v}"]`).forEach(b=>b.classList.toggle('active',on));
  applyFilters();
  buildFlashQueue();renderFlashCard();
}

function applyFilters(){
  const q=document.getElementById('search-input').value.trim().toLowerCase();
  document.querySelectorAll('.group-section').forEach(sec=>{
    const lv=sec.dataset.level;
    if(!activeFilters.level.has(lv)){sec.style.display='none';return;}
    let vis=0;
    sec.querySelectorAll('.word-card').forEach(card=>{
      const ok=activeFilters.pos.has(card.dataset.pos)&&(!q||card.dataset.word.toLowerCase().includes(q)||card.dataset.meaning.toLowerCase().includes(q)||card.dataset.reading.toLowerCase().includes(q));
      card.style.display=ok?'':'none';
      if(ok)vis++;
    });
    sec.style.display=vis>0?'':'none';
    const cnt=sec.querySelector('.group-count');
    if(cnt)cnt.textContent=vis;
  });
}

function getCardColor(pos){return{'명사':'var(--accent)','동사':'var(--green)','い형':'var(--yellow)','な형':'var(--purple)','부사':'var(--teal)','외래어':'var(--orange)'}[pos]||'var(--border)';}

function renderList(){
  const c=document.getElementById('list-content');c.innerHTML='';
  GROUPS.forEach(group=>{
    const sec=document.createElement('div');sec.className='group-section';sec.dataset.level=group.level;
    const lc={'S':'level-S','A':'level-A','B':'level-B','기타한자':'level-기타','히라가나':'level-히라','부사':'level-부사','외래어':'level-외래'}[group.level]||'level-기타';
    const lt={'S':'S급','A':'A급','B':'B급','기타한자':'기타한자','히라가나':'히라가나','부사':'부사','외래어':'외래어'}[group.level]||group.level;
    const isSp=['기타한자','히라가나','부사','외래어'].includes(group.level);
    const hk=isSp?(group.level==='히라가나'?'ひら':group.level==='부사'?'副':group.level==='외래어'?'カタ':'他'):group.id;
    sec.innerHTML=`<div class="group-header" onclick="toggleGroup(this)"><div class="group-kanji">${hk}</div><div><div style="font-size:13px;font-weight:600">${isSp?group.level:group.id+' · '+group.label}</div>${!isSp?`<div class="group-label">${group.label}</div>`:''}</div><span class="level-badge ${lc}">${lt}</span><span class="group-count">${group.words.length}</span><span class="group-toggle open">▶</span></div><div class="words-grid"></div>`;
    const grid=sec.querySelector('.words-grid');
    group.words.forEach(word=>{
      const wid=getWordId(word),lvl=getMemLevel(wid);
      const card=document.createElement('div');card.className='word-card'+(lvl===3?' memorized':'');
      card.dataset.pos=word.pos;card.dataset.word=word.w;card.dataset.meaning=word.m;card.dataset.reading=word.r;card.dataset.wid=wid;
      card.style.setProperty('--card-color',getCardColor(word.pos));
      // ★ day tag
      const dayHtml=word.day?`<span class="day-tag">#${word.day}일</span>`:'';
      card.innerHTML=`<div class="check-dots card-dots">${dotsSpans(lvl)}</div><div class="word-jp">${word.w}</div><div class="word-reading">${word.r}</div><div class="word-meaning">${word.m}</div><div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:5px"><span class="pos-badge pos-${word.pos}">${word.pos}</span>${dayHtml}</div>`;
      card.onclick=()=>toggleWordMemorize(card,wid);grid.appendChild(card);
    });
    c.appendChild(sec);
  });
  applyFilters();
}

function toggleGroup(h){
  const g=h.nextElementSibling,t=h.querySelector('.group-toggle');
  if(g.style.display==='none'){g.style.display='';t.classList.add('open');}
  else{g.style.display='none';t.classList.remove('open');}
}

function toggleWordMemorize(card,wid){
  const lvl=cycleMemLevel(wid);
  card.classList.toggle('memorized',lvl===3);
  const dots=card.querySelector('.check-dots');
  if(dots)dots.innerHTML=dotsSpans(lvl);
  updateProgress();
  if(flashQueue.length&&getWordId(flashQueue[flashIndex])===wid)renderFlashCard();
}

function buildFlashQueue(){
  let all=[];
  GROUPS.forEach(g=>g.words.forEach(w=>all.push({...w,groupId:g.id,groupLabel:g.label,groupLevel:g.level})));
  all=all.filter(w=>activeFilters.level.has(w.groupLevel)&&activeFilters.pos.has(w.pos));
  if(flashFilter==='unmemorized')all=all.filter(w=>getMemLevel(getWordId(w))<3);
  else if(flashFilter==='memorized')all=all.filter(w=>getMemLevel(getWordId(w))===3);
  if(flashDayFilter>0)all=all.filter(w=>w.day===flashDayFilter);
  flashQueue=all;flashIndex=0;
}

function renderDayChips(){
  const row=document.getElementById('flash-day-row');
  row.innerHTML='';
  const allBtn=document.createElement('button');
  allBtn.className='day-chip'+(flashDayFilter===0?' active':'');
  allBtn.textContent='전체';
  allBtn.onclick=()=>{flashDayFilter=0;renderDayChips();buildFlashQueue();renderFlashCard();};
  row.appendChild(allBtn);
  for(let d=1;d<=20;d++){
    const cnt=(() => { let c=0; GROUPS.forEach(g=>g.words.forEach(w=>{if(w.day===d)c++;})); return c; })();
    if(cnt===0) continue;
    const btn=document.createElement('button');
    btn.className='day-chip'+(flashDayFilter===d?' active':'');
    btn.textContent=`${d}일`;
    btn.onclick=(()=>{const day=d;return()=>{flashDayFilter=day;renderDayChips();buildFlashQueue();renderFlashCard();}})();
    row.appendChild(btn);
  }
}

function setFlashFilter(val,btn){
  flashFilter=val;
  document.querySelectorAll('[data-flash-filter]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');buildFlashQueue();renderFlashCard();
}

function toggleFurigana(){
  furiganaOn=!furiganaOn;
  document.getElementById('furigana-toggle').classList.toggle('active',furiganaOn);
  renderFlashCard();
}

function shuffleFlash(){
  for(let i=flashQueue.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[flashQueue[i],flashQueue[j]]=[flashQueue[j],flashQueue[i]];}
  flashIndex=0;renderFlashCard();
}

function renderFlashCard(){
  document.getElementById('flash-card').classList.remove('flipped');isFlipped=false;
  const total=flashQueue.length;
  document.getElementById('flash-counter').textContent=total?`${flashIndex+1} / ${total}`:'0 / 0';
  document.getElementById('flash-stat').textContent=`${flashQueue.filter(w=>getMemLevel(getWordId(w))===3).length} 암기 / ${total} 전체`;
  if(!total){['f-word','f-reading','f-meaning','f-related','f-group'].forEach(id=>document.getElementById(id).textContent='');document.getElementById('f-pos-front').innerHTML='';document.getElementById('f-day-tag').style.display='none';document.getElementById('f-mem-dots').innerHTML='';return;}
  const w=flashQueue[flashIndex],wid=getWordId(w);
  const isSp=['기타한자','히라가나','부사','외래어'].includes(w.groupLevel);
  document.getElementById('f-group').textContent=isSp?w.groupLevel:`${w.groupId} 그룹 (${w.groupLabel})`;
  const wordEl=document.getElementById('f-word');
  if(furiganaOn&&w.r&&w.r!==w.w)wordEl.innerHTML=`<ruby>${w.w}<rt>${w.r}</rt></ruby>`;
  else wordEl.textContent=w.w;
  document.getElementById('f-pos-front').innerHTML=`<span class="pos-badge pos-${w.pos}">${w.pos}</span>`;
  // ★ day tag on flash card
  const dayEl=document.getElementById('f-day-tag');
  if(w.day){dayEl.textContent=`#${w.day}일차`;dayEl.style.display='';}
  else{dayEl.style.display='none';}
  document.getElementById('f-reading').textContent=w.r;
  document.getElementById('f-meaning').textContent=w.m;
  const grp=GROUPS.find(g=>g.id===w.groupId);
  document.getElementById('f-related').textContent=grp&&grp.words.length>1?'관련어: '+grp.words.filter(x=>x.w!==w.w).slice(0,4).map(x=>x.w).join(' / '):'';
  const btn=document.getElementById('memorize-btn');
  const lvl=getMemLevel(wid);
  document.getElementById('f-mem-dots').innerHTML=dotsSpans(lvl);
  if(lvl===0){btn.textContent='☆ 체크하기';btn.classList.remove('undone');}
  else if(lvl===3){btn.textContent='✓ 암기완료';btn.classList.remove('undone');}
  else{btn.textContent=`● 체크 ${lvl}/3`;btn.classList.remove('undone');}
}

function flipCard(){isFlipped=!isFlipped;document.getElementById('flash-card').classList.toggle('flipped',isFlipped);}
function nextCard(){if(flashQueue.length){flashIndex=(flashIndex+1)%flashQueue.length;renderFlashCard();}}
function prevCard(){if(flashQueue.length){flashIndex=(flashIndex-1+flashQueue.length)%flashQueue.length;renderFlashCard();}}

function toggleMemorize(){
  if(!flashQueue.length)return;
  const w=flashQueue[flashIndex],wid=getWordId(w);
  cycleMemLevel(wid);
  updateProgress();renderFlashCard();
  const lvl=getMemLevel(wid);
  document.querySelectorAll('.word-card').forEach(card=>{
    if(card.dataset.wid===wid){card.classList.toggle('memorized',lvl===3);const d=card.querySelector('.check-dots');if(d)d.innerHTML=dotsSpans(lvl);}
  });
}

function switchTab(name){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  event.target.classList.add('active');
  if(name==='flash'){buildFlashQueue();renderFlashCard();renderDayChips();}
}

loadMemorized();updateDday();renderList();updateProgress();buildFlashQueue();renderFlashCard();renderDayChips();
</script>
</body>
</html>
